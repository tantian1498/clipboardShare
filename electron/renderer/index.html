<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipboardShare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 顶栏：搜索 + 状态 + 设置 -->
  <div class="topbar">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 20 20" width="14" height="14">
        <path fill="currentColor" d="M8.5 3a5.5 5.5 0 014.227 9.02l4.127 4.126a.75.75 0 01-1.06 1.061l-4.128-4.127A5.5 5.5 0 118.5 3zm0 1.5a4 4 0 100 8 4 4 0 000-8z"/>
      </svg>
      <input type="text" id="searchInput" placeholder="搜索剪贴板..." autocomplete="off">
    </div>
    <div class="topbar-right">
      <div class="status-indicator" id="statusIndicator" title="未连接"></div>
      <button class="icon-btn" id="settingsBtn" title="设置">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 筛选标签 -->
  <div class="filter-tabs">
    <button class="tab active" data-filter="all">全部</button>
    <button class="tab" data-filter="text">文本</button>
    <button class="tab" data-filter="image">图像</button>
  </div>

  <!-- 历史记录列表 -->
  <div class="history-list" id="historyList">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📋</div>
      <div class="empty-text">暂无剪贴板记录</div>
      <div class="empty-hint">复制内容后将自动显示在这里</div>
    </div>
  </div>

  <!-- 设置面板（覆盖层） -->
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">
      <div class="settings-header">
        <h2>设置</h2>
        <button class="icon-btn" id="settingsCloseBtn">
          <svg viewBox="0 0 20 20" width="16" height="16">
            <path fill="currentColor" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/>
          </svg>
        </button>
      </div>

      <div class="settings-body">
        <!-- 连接状态 -->
        <div class="setting-section">
          <div class="section-label">连接状态</div>
          <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <div class="status-text" id="statusText">未连接</div>
            <div class="status-device" id="statusDevice"></div>
          </div>
        </div>

        <!-- 模式选择 -->
        <div class="setting-section">
          <div class="section-label">运行模式</div>
          <div class="setting-card">
            <div class="radio-group">
              <div class="radio-btn active" id="modeHost" data-mode="host">本机当服务器</div>
              <div class="radio-btn" id="modeClient" data-mode="client">连接远程服务器</div>
            </div>
            <div class="input-group" id="serverUrlGroup" style="display:none">
              <label>服务器地址</label>
              <input type="text" id="serverUrl" placeholder="http://192.168.1.100:3846">
            </div>
            <div class="input-group" id="portGroup">
              <label>端口号</label>
              <input type="number" id="port" value="3846" min="1" max="65535">
            </div>
          </div>
        </div>

        <!-- 开机自启 -->
        <div class="setting-section">
          <div class="setting-row">
            <span>开机自动启动</span>
            <label class="switch">
              <input type="checkbox" id="autoLaunch">
              <span class="switch-slider"></span>
            </label>
          </div>
        </div>

        <!-- 保存按钮 -->
        <button class="btn-primary" id="saveBtn">保存并应用</button>

        <!-- 版本 -->
        <div class="setting-section">
          <div class="version-row">
            <span class="version-text" id="versionText">v1.0.0</span>
            <button class="btn-link" id="checkUpdateBtn">检查更新</button>
          </div>
          <div class="update-info" id="updateInfo" style="display:none">
            <div class="update-badge">发现新版本 <strong id="newVersionText"></strong></div>
            <div class="update-notes" id="updateNotes"></div>
            <button class="btn-primary btn-sm" id="downloadBtn">前往下载</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
